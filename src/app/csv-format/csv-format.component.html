<h2>CSV Format</h2>
<div>
  <mat-form-field class="example-full-width" style="width: 100%">
    <textarea matInput name="csv" [formControl]="csv" placeholder="CSV" rows="10" style="width: 100%; font-family: Consolas, 'Courier New', Courier, Monaco, monospace;"></textarea>
  </mat-form-field>
  <button mat-raised-button (click)="format()">Format</button>
</div>
